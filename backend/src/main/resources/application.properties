# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Application Name
spring.application.name=inventory-management

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/bakerydb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=romen@2002

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# JWT Configuration
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Application Configuration
app.base-url=http://localhost:8080
app.frontend-url=http://localhost:5173
app.upload-dir=./uploads/
app.allowed-file-types=jpg,jpeg,png,gif
app.max-file-size-mb=5

# Logging Configuration
logging.level.com.romen.inventory=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
