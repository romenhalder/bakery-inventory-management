# Server Configuration
server.port=8080
#server.servlet.context-path=/api

# Application Name
spring.application.name=inventory-management

# Database Configuration (Supabase PostgreSQL - Direct Connection)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://db.qhqchimzovjtwehwjqic.supabase.co:5432/postgres?sslmode=require}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:Bakerypostgresql}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL Initialization (disabled - schema managed by JPA)
spring.sql.init.mode=never

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

